<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B8DBE"/>
      <stop offset="100%" style="stop-color:#3A6B9F"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 迷宫路径 -->
  <g fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- 外框 -->
    <rect x="96" y="96" width="320" height="320" rx="12" ry="12"/>
    <!-- 内部迷宫线 -->
    <line x1="96" y1="176" x2="296" y2="176"/>
    <line x1="296" y1="176" x2="296" y2="256"/>
    <line x1="296" y1="256" x2="176" y2="256"/>
    <line x1="176" y1="256" x2="176" y2="336"/>
    <line x1="176" y1="336" x2="336" y2="336"/>
    <line x1="336" y1="256" x2="416" y2="256"/>
    <line x1="336" y1="176" x2="336" y2="96"/>
    <line x1="176" y1="96" x2="176" y2="176"/>
  </g>
  <!-- 入口标记（小圆点） -->
  <circle cx="96" cy="256" r="16" fill="#EF4444"/>
  <!-- 出口标记（小圆点） -->
  <circle cx="416" cy="256" r="16" fill="#22C55E"/>
</svg>
